name: Validate dataset entries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install validation deps
        run: pip install -r requirements.txt

      - name: Validate entries against schema
        run: python scripts/validate.py

      - name: Verify README is up to date
        run: |
          python scripts/build_readme.py
          if ! git diff --quiet -- README.md; then
            echo "::error::README.md is out of sync with data/. Run 'python scripts/build_readme.py' locally and commit."
            git --no-pager diff README.md | head -200
            exit 1
          fi
