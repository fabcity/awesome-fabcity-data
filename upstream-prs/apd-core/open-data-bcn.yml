title: Open Data BCN
homepage: https://opendata-ajuntament.barcelona.cat/
description: |
  Open data portal of the Barcelona City Council. ~600 datasets on
  mobility, environment, demographics, economy, governance, urban
  fabric, public health, and budget execution. CKAN-based with full
  bulk + REST API, machine-readable metadata, and CC-BY-4.0 licensing
  on most resources. Among the most mature municipal open-data
  programmes in Europe.
