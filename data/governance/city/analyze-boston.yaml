notes: |
  Boston pilot's equivalent of Open Data BCN. 311 service
  requests dataset is the H_0-A action-latency goldmine for
  Boston: time-from-complaint-to-resolution at the address
  level. Combine with MassGIS for spatial joining and with
  ENTSO-E equivalent (US: PUDL) for energy-grid context.
