notes: |
  Santiago pilot's open-data substrate. Combine with ChileCompra
  for procurement and LAKLEMS for sectoral productivity. Coverage
  of the Region Metropolitana is dense; rural Chile is patchier.
  CKAN API supports bulk + filtered pulls; rate-limited but
  generous for production observatory use.
