notes: |
  Bali pilot's TED equivalent. SPSE portal exposes per-tender
  pages with timestamps but no consistent bulk API yet — INA-Proc
  research consortium has scraped + published periodic dumps.
  Pairs with Bali Satu Data for cross-validation. Indonesian
  procurement-transparency commitments under Open Government
  Partnership commitments make this dataset structurally
  important for the H_0-A baseline despite the API gap.
