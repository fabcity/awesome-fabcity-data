name: LKPP / SPSE — Indonesian National Procurement
url: https://www.lkpp.go.id/
description: |
  Indonesian Lembaga Kebijakan Pengadaan Barang/Jasa Pemerintah
  (LKPP) operates SPSE, the national e-procurement system. Public
  tender data for central government and most regional bodies
  including Bali province.
pillar: governance
scale: bioregion
status: live
