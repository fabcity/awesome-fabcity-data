name: OpenAQ
url: https://openaq.org/
description: |
  Reference-grade air quality aggregator. Pulls from ~10k+ regulatory
  monitoring stations globally and harmonises to a common schema.
  Free public API with optional auth for higher rate limits.
pillar: environmental
scale: city
status: live
license: CC-BY-4.0
api: https://api.openaq.org/v3
pilot_relevance: [barcelona, boston, santiago, bali, global]
tags: [air-quality, regulatory-monitoring, harmonised]
added: 2026-05-04
wired_in_planetai: true
upstream_listed_in: [awesome-public-datasets]
notes: |
  v3 API recommends API key for production use. Bbox queries are the
  fastest filter. Combine with Sensor.Community for community-tier
  density layer, with Smart Citizen for community-deployed sensors.
