notes: |
  Indonesia included since 2010. The single most relevant
  productivity dataset for Bali Region-tier, since neither
  Atlas of Economic Complexity (country-level only) nor
  Metroverse (no Denpasar coverage) reaches the resolution
  needed. Combined with Bali Satu Data this gives the Bali
  pilot a coherent Region+City layer.
